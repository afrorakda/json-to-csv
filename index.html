<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JSON to CSV</title>
    
    <link rel="icon" href="image_32.png">
    <link rel="apple-touch-icon" href="image_32.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        /* 憲法: 全要素 15px角丸 / iOS Safari対策 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; }

        .hub-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--main);
            background: var(--accent);
            padding: 8px 14px;
            border-radius: var(--radius);
        }

        .subtitle { font-size: 0.9rem; color: #666; font-weight: 700; text-align: left; }

        .input-card {
            background: var(--input-bg);
            padding: 18px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
        }

        .label {
            font-size: 0.75rem;
            font-weight: 900;
            color: #666;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
        }

        .input-wrapper { position: relative; }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            padding-right: 45px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background: #fff;
            font-size: 0.9rem;
            font-family: ui-monospace, monospace;
            font-weight: 600;
            color: var(--main) !important;
            outline: none;
            resize: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }
        /* 透かしのコントラスト調整 */
        textarea::placeholder { color: #bbb !important; -webkit-text-fill-color: #bbb !important; opacity: 1 !important; }

        /* clr（クリア）ボタン: 入力時のみ表示 */
        .clr-btn {
            position: absolute; top: 10px; right: 10px; width: 28px; height: 28px;
            background: #ccc; color: #fff; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 16px; font-weight: bold; z-index: 5;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            background: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            -webkit-text-fill-color: #fff;
        }
        .action-btn:active { transform: scale(0.98); }

        .result-area { display: none; flex-direction: column; gap: 15px; }
        .result-area.active { display: flex; }

        .btn-row { display: flex; gap: 10px; }
        .secondary-btn {
            flex: 1; padding: 15px; background: var(--accent); color: var(--main);
            border: none; border-radius: var(--radius); font-weight: 800; font-size: 0.9rem; cursor: pointer;
        }

        .footer-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .kofi-btn {
            background: var(--main); color: #fff; text-decoration: none;
            padding: 16px; border-radius: var(--radius); text-align: center;
            font-weight: 900; font-size: 0.9rem; -webkit-text-fill-color: #fff;
        }
        .home-btn {
            background: var(--accent); color: var(--main); border: none;
            padding: 12px; border-radius: var(--radius); font-weight: 800; font-size: 0.8rem; cursor: pointer;
        }

        /* 鉄壁フッター（聖域） */
        footer { text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; margin-top: 15px; }
        footer a { color: inherit; text-decoration: underline; }

        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 340px; padding: 35px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>JSON to CSV</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">Convert JSON array to CSV format.</p>

    <div class="input-card">
        <label class="label">Input JSON</label>
        <div class="input-wrapper">
            <textarea id="jsonInput" placeholder='[{"name":"John","age":30}]' oninput="toggleClr()"></textarea>
            <button class="clr-btn" id="clrBtn" onclick="clearInput()">×</button>
        </div>
    </div>

    <button class="action-btn" onclick="convertToCSV()">Convert to CSV</button>

    <div class="result-area" id="resultArea">
        <div class="input-card">
            <label class="label">Output CSV</label>
            <textarea id="csvOutput" readonly></textarea>
        </div>
        <div class="btn-row">
            <button class="secondary-btn" onclick="copyToClipboard()">Copy</button>
            <button class="secondary-btn" onclick="downloadCSV()">Download</button>
        </div>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️ buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer id="dynamicFooter">
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 style="margin-bottom: 15px; font-weight: 900;">📱 Install</h3>
        <p style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">
            🍏 <strong>iPhone:</strong><br>Share > Add to Home Screen<br><br>
            🤖 <strong>Android:</strong><br>Menu (⋮) > Add to Home Screen
        </p>
    </div>
</div>

<script>
    const jsonInput = document.getElementById('jsonInput');
    const clrBtn = document.getElementById('clrBtn');
    const resultArea = document.getElementById('resultArea');
    const csvOutput = document.getElementById('csvOutput');

    function toggleClr() {
        clrBtn.style.display = jsonInput.value.length > 0 ? 'flex' : 'none';
    }

    function clearInput() {
        jsonInput.value = '';
        toggleClr();
        resultArea.classList.remove('active');
        jsonInput.focus();
    }

    function convertToCSV() {
        const input = jsonInput.value.trim();
        if (!input) return;

        try {
            const json = JSON.parse(input);
            const array = Array.isArray(json) ? json : [json];
            if (array.length === 0) return;

            const headers = Object.keys(array[0]);
            const csvRows = [];
            csvRows.push(headers.join(','));

            for (const row of array) {
                const values = headers.map(header => {
                    const val = row[header] === null || row[header] === undefined ? '' : row[header];
                    const escaped = ('' + val).replace(/"/g, '""');
                    return `"${escaped}"`;
                });
                csvRows.push(values.join(','));
            }

            csvOutput.value = csvRows.join('\n');
            resultArea.classList.add('active');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } catch (e) {
            alert('Invalid JSON format.');
        }
    }

    async function copyToClipboard() {
        try {
            await navigator.clipboard.writeText(csvOutput.value);
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = 'Copied!';
            setTimeout(() => btn.innerText = originalText, 1500);
        } catch (err) {
            console.error('Failed to copy');
        }
    }

    function downloadCSV() {
        const csv = csvOutput.value;
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'data.csv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
