<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JSON Flatten to CSV</title>
    
    <link rel="icon" href="image_32.png">
    <link rel="apple-touch-icon" href="image_32.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --error: #e63946;
        }

        /* 憲法遵守: 角丸15px / iOS Safari対策 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        
        /* 入力欄のみテキスト操作許可 */
        textarea { -webkit-user-select: text; user-select: text; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -1.2px; }

        .hub-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--main);
            background: var(--accent);
            padding: 8px 14px;
            border-radius: var(--radius);
        }

        .subtitle { font-size: 0.85rem; color: #666; font-weight: 700; text-align: left; }

        .input-card {
            background: var(--input-bg);
            padding: 18px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            position: relative;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 900;
            color: #666;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
        }

        .input-wrapper { position: relative; }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            padding-right: 45px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background: #fff;
            font-size: 0.9rem;
            font-family: ui-monospace, monospace;
            font-weight: 600;
            color: var(--main) !important;
            outline: none;
            resize: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }
        textarea::placeholder { color: #bbb !important; -webkit-text-fill-color: #bbb !important; opacity: 1 !important; }

        .clr-btn {
            position: absolute; top: 10px; right: 10px; width: 28px; height: 28px;
            background: #ccc; color: #fff; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 16px; font-weight: bold; z-index: 5;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            background: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            -webkit-text-fill-color: #fff;
        }
        .action-btn:active { transform: scale(0.98); }

        #errorMsg {
            color: var(--error);
            font-size: 0.75rem;
            font-weight: 800;
            margin-top: 5px;
            display: none;
            text-align: center;
        }

        .result-area { display: none; flex-direction: column; gap: 15px; }
        .result-area.active { display: flex; }

        .btn-row { display: flex; gap: 10px; }
        .secondary-btn {
            flex: 1; padding: 15px; background: var(--accent); color: var(--main);
            border: none; border-radius: var(--radius); font-weight: 800; font-size: 0.9rem; cursor: pointer;
        }

        .footer-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .kofi-btn {
            background: var(--main); color: #fff; text-decoration: none;
            padding: 16px; border-radius: var(--radius); text-align: center;
            font-weight: 900; font-size: 0.9rem; -webkit-text-fill-color: #fff;
        }
        .home-btn {
            background: var(--accent); color: var(--main); border: none;
            padding: 12px; border-radius: var(--radius); font-weight: 800; font-size: 0.8rem; cursor: pointer;
        }

        /* 鉄壁フッター（聖域） */
        footer { text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; margin-top: 15px; }
        footer a { color: inherit; text-decoration: underline; }

        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 340px; padding: 35px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>JSON Flatten to CSV</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">Smart conversion for nested JSON data.</p>

    <div class="input-card">
        <label class="label">Input JSON</label>
        <div class="input-wrapper">
            <textarea id="jsonInput" placeholder='[{"user":{"name":"John"},"age":30}]' oninput="toggleClr()"></textarea>
            <button class="clr-btn" id="clrBtn" onclick="clearInput()">×</button>
        </div>
        <div id="errorMsg">Invalid JSON format</div>
    </div>

    <button class="action-btn" onclick="processConversion()">Convert to CSV</button>

    <div class="result-area" id="resultArea">
        <div class="input-card">
            <label class="label">Output CSV</label>
            <textarea id="csvOutput" readonly></textarea>
        </div>
        <div class="btn-row">
            <button class="secondary-btn" onclick="copyToClipboard()">Copy</button>
            <button class="secondary-btn" onclick="downloadCSV()">Download</button>
        </div>
    </div>

    <div class="footer-btns">
        <a id="kofi-link" href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️ buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer>
        <span id="footer-text">No login / No tracking / No ads / Browser only</span><br>
        <a id="privacy-link" href="https://afrorakda.com/privacy/">Privacy Policy</a> / <span id="copyright">afrorakda © 2026</span>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 id="modal-title" style="margin-bottom: 15px; font-weight: 900;">📱 Install</h3>
        <p id="modal-body" style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">
            🍏 <strong>iPhone:</strong><br>Share > Add to Home Screen<br><br>
            🤖 <strong>Android:</strong><br>Menu (⋮) > Add to Home Screen
        </p>
    </div>
</div>

<script>
    const jsonInput = document.getElementById('jsonInput');
    const clrBtn = document.getElementById('clrBtn');
    const errorMsg = document.getElementById('errorMsg');
    const resultArea = document.getElementById('resultArea');
    const csvOutput = document.getElementById('csvOutput');

    function toggleClr() {
        clrBtn.style.display = jsonInput.value.length > 0 ? 'flex' : 'none';
        errorMsg.style.display = 'none';
    }

    function clearInput() {
        jsonInput.value = '';
        toggleClr();
        resultArea.classList.remove('active');
        jsonInput.focus();
    }

    // 外部参照: 標準的なネスト解除（フラット化）アルゴリズム
    function flattenObject(obj, prefix = '') {
        return Object.keys(obj).reduce((acc, k) => {
            const pre = prefix.length ? prefix + '.' : '';
            if (typeof obj[k] === 'object' && obj[k] !== null && !Array.isArray(obj[k])) {
                Object.assign(acc, flattenObject(obj[k], pre + k));
            } else {
                acc[pre + k] = obj[k];
            }
            return acc;
        }, {});
    }

    function processConversion() {
        errorMsg.style.display = 'none';
        const input = jsonInput.value.trim();
        if (!input) return;

        try {
            const rawJson = JSON.parse(input);
            const array = Array.isArray(rawJson) ? rawJson : [rawJson];
            if (array.length === 0) return;

            const flattenedArray = array.map(item => flattenObject(item));
            const headerSet = new Set();
            flattenedArray.forEach(obj => Object.keys(obj).forEach(k => headerSet.add(k)));
            const headers = Array.from(headerSet);

            const escape = (val) => {
                if (val === null || val === undefined) return '""';
                let str = String(val);
                if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                    str = '"' + str.replace(/"/g, '""') + '"';
                }
                return str;
            };

            const csvRows = [];
            csvRows.push(headers.map(h => escape(h)).join(','));

            for (const row of flattenedArray) {
                const line = headers.map(h => escape(row[h] || ''));
                csvRows.push(line.join(','));
            }

            csvOutput.value = csvRows.join('\n');
            resultArea.classList.add('active');
            window.scrollTo({ top: resultArea.offsetTop - 20, behavior: 'smooth' });

        } catch (e) {
            errorMsg.style.display = 'block';
        }
    }

    async function copyToClipboard() {
        try {
            await navigator.clipboard.writeText(csvOutput.value);
            const btn = event.target;
            const original = btn.innerText;
            btn.innerText = 'Copied!';
            setTimeout(() => btn.innerText = original, 1500);
        } catch (err) { console.error(err); }
    }

    function downloadCSV() {
        const csv = csvOutput.value;
        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'data.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    // 鉄壁ロジック: 削除厳禁・聖域
    async function loadFooter() {
        try {
            const response = await fetch('footer.json');
            if (response.ok) {
                const data = await response.json();
                if (data.footerText) document.getElementById('footer-text').innerText = data.footerText;
                if (data.privacyLink) document.getElementById('privacy-link').href = data.privacyLink;
                if (data.copyright) document.getElementById('copyright').innerText = data.copyright;
                if (data.kofiText) document.getElementById('kofi-link').innerText = data.kofiText;
                if (data.modalTitle) document.getElementById('modal-title').innerText = data.modalTitle;
                if (data.modalBody) document.getElementById('modal-body').innerHTML = data.modalBody;
            }
        } catch (e) { console.log("Static footer active."); }
    }

    loadFooter();
</script>

</body>
</html>
