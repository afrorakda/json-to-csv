<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSON to CSV Converter</title>
    
    <link rel="icon" href="image_32.png">
    <link rel="apple-touch-icon" href="image_32.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; }

        .input-group { margin-bottom: 25px; text-align: left; position: relative; }
        label { display: block; font-size: 0.75rem; font-weight: 800; margin-bottom: 8px; margin-left: 5px; color: #666; }

        .input-wrapper { position: relative; }
        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background: var(--input-bg);
            font-size: 0.9rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-weight: 600;
            color: var(--main) !important;
            box-sizing: border-box;
            outline: none;
            resize: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }
        textarea::placeholder { color: #aaa !important; -webkit-text-fill-color: #aaa !important; font-weight: 500; }

        .clear-btn {
            position: absolute; top: 10px; right: 10px; width: 30px; height: 30px;
            background: var(--accent); color: #666; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 18px; font-weight: bold; z-index: 5;
        }

        .convert-btn {
            width: 100%;
            padding: 18px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.2s;
        }
        .convert-btn:active { transform: scale(0.98); opacity: 0.9; }

        .result-group { text-align: left; display: none; }
        .result-group.active { display: block; }

        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .secondary-btn {
            flex: 1;
            padding: 12px;
            background: var(--accent);
            color: var(--main);
            border: none;
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
        }

        footer { margin-top: 50px; font-size: 11px; color: #aaa; line-height: 1.8; }
        .footer-btns { margin-top: 30px; }
        .kofi-btn {
            display: inline-block; background: var(--main); color: #fff;
            padding: 12px 25px; border-radius: var(--radius);
            text-decoration: none; font-weight: bold; font-size: 14px; margin-bottom: 12px;
        }
        .home-btn {
            display: block; width: 60%; margin: 0 auto; background: var(--accent);
            color: var(--main); border: none; padding: 10px;
            border-radius: var(--radius); font-weight: 700; font-size: 13px; cursor: pointer;
        }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #fff; width: 85%; max-width: 320px; padding: 30px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 20px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>JSON to CSV</h1>

    <div class="input-group">
        <label>Input JSON (Array)</label>
        <div class="input-wrapper">
            <textarea id="jsonInput" placeholder='[{"name":"John","age":30},{"name":"Jane","age":25}]' spellcheck="false"></textarea>
            <button class="clear-btn" onclick="clearInput()">×</button>
        </div>
    </div>

    <button class="convert-btn" onclick="convertToCSV()">Convert to CSV</button>

    <div class="result-group" id="resultArea">
        <label>Output CSV</label>
        <div class="input-wrapper">
            <textarea id="csvOutput" readonly spellcheck="false"></textarea>
        </div>
        <div class="btn-row">
            <button class="secondary-btn" onclick="copyToClipboard()">Copy</button>
            <button class="secondary-btn" onclick="downloadCSV()">Download</button>
        </div>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕ Support me on Ko-fi</a>
        <button class="home-btn" onclick="document.getElementById('modal').style.display='flex'">Add to Home Screen</button>
    </div>

    <footer>
        <div>No login / No tracking / No ads / Browser only</div>
        <div>Privacy Policy / afrorakda © 2026</div>
    </footer>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="document.getElementById('modal').style.display='none'">×</span>
        <p>🍏 <strong>iPhone:</strong> Share > Add to Home Screen</p>
        <p>🤖 <strong>Android:</strong> Menu > Add to Home Screen</p>
    </div>
</div>

<script>
    function clearInput() {
        document.getElementById('jsonInput').value = '';
        document.getElementById('resultArea').classList.remove('active');
    }

    function convertToCSV() {
        const input = document.getElementById('jsonInput').value.trim();
        if (!input) return;

        try {
            const json = JSON.parse(input);
            const array = Array.isArray(json) ? json : [json];
            
            if (array.length === 0) return;

            const headers = Object.keys(array[0]);
            const csvRows = [];
            
            // Header row
            csvRows.push(headers.join(','));

            // Data rows
            for (const row of array) {
                const values = headers.map(header => {
                    const val = row[header] === null || row[header] === undefined ? '' : row[header];
                    const escaped = ('' + val).replace(/"/g, '""');
                    return `"${escaped}"`;
                });
                csvRows.push(values.join(','));
            }

            document.getElementById('csvOutput').value = csvRows.join('\n');
            document.getElementById('resultArea').classList.add('active');
        } catch (e) {
            alert('Invalid JSON format. Please check your input.');
        }
    }

    function copyToClipboard() {
        const copyText = document.getElementById('csvOutput');
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        document.execCommand("copy");
        alert("Copied to clipboard!");
    }

    function downloadCSV() {
        const csv = document.getElementById('csvOutput').value;
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('hidden', '');
        a.setAttribute('href', url);
        a.setAttribute('download', 'data.csv');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>

</body>
</html>
